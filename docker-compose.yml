version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: taskflow-postgres
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - taskflow-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  taskflow-postgres-data:
    driver: local

